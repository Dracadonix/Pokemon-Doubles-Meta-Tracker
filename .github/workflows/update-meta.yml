name: Update Pokémon Meta Data 2026

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:  # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      
      - name: Fetch Smogon 2026 data
        run: |
          # Try multiple 2026 format URLs
          curl -s "https://www.smogon.com/stats/2026-01/gen9vgc2026regulationh-0.txt" || \
          curl -s "https://www.smogon.com/stats/2026-01/gen9vgc2026-0.txt" || \
          curl -s "https://www.smogon.com/stats/2026-01/gen9vgc2026doubles-0.txt" > smogon_2026.txt
          
          # Parse the data
          grep -E '^ \|' smogon_2026.txt | \
          awk -F'|' 'NR>1 && $3 !~ /^[[:space:]]*$/ {gsub(/^[ \t]+|[ \t]+$/, "", $3); gsub(/%/, "", $4); print "\""$3"\": " $4}' | \
          head -100 > temp.json
          
          echo "{" > meta_data.json
          cat temp.json | paste -sd, - >> meta_data.json
          echo "}" >> meta_data.json
      
      - name: Clean up data
        run: |
          sed -i 's/\"\"/\"/g' meta_data.json
          sed -i 's/,[[:space:]]*}/}/g' meta_data.json
          sed -i '/^[[:space:]]*"":/d' meta_data.json
          
          # Add metadata
          echo "{\"season\": \"VGC 2026\", \"regulation\": \"H\", \"last_fetched\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\", \"data\": " > temp_meta.json
          cat meta_data.json >> temp_meta.json
          echo "}" >> temp_meta.json
          mv temp_meta.json meta_data.json
      
      - name: Commit and push
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add meta_data.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update VGC 2026 meta data $(date +'%Y-%m-%d %H:%M:%S')"
          git push
