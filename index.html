<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Champions Doubles Tracker — M-1 Season</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#D85A30;--red2:#993C1D;--red-l:#FAECE7;
  --blue:#378ADD;--blue-l:#E6F1FB;--blue-dk:#042C53;
  --teal:#1D9E75;--teal-l:#E1F5EE;--teal-dk:#04342C;
  --amber:#BA7517;--amber-l:#FAEEDA;
  --gray1:#F1EFE8;--gray2:#D3D1C7;--gray3:#888780;--gray4:#2C2C2A;
  --bg:#0f0f13;--bg2:#18181f;--bg3:#22222c;--bg4:#2c2c38;
  --txt:#f0eff8;--txt2:#9999aa;--txt3:#55556a;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);
  font-family:'Barlow',sans-serif;
}
body{background:var(--bg);color:var(--txt);min-height:100vh}
.wrap{max-width:860px;margin:0 auto;padding:1.5rem 1rem 4rem}

/* HEADER */
.hdr{display:flex;align-items:center;gap:14px;margin-bottom:2rem;padding-bottom:1.25rem;border-bottom:1px solid var(--border2)}
.hdr-ball{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--red) 50%,white 50%);border:3px solid white;position:relative;box-shadow:0 0 16px rgba(216,90,48,0.4);flex-shrink:0}
.hdr-ball::after{content:'';position:absolute;width:8px;height:8px;border-radius:50%;background:white;border:2px solid var(--red2);top:50%;left:50%;transform:translate(-50%,-50%)}
.hdr-txt h1{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:22px;letter-spacing:1px;text-transform:uppercase;color:var(--txt)}
.hdr-txt p{font-size:12px;color:var(--txt2);margin-top:1px}
.season-pill{margin-left:auto;background:var(--red-l);color:var(--red);font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;white-space:nowrap;border:1px solid var(--red)}

/* TABS */
.tabs{display:flex;gap:3px;margin-bottom:1.5rem;background:var(--bg2);padding:4px;border-radius:10px;border:1px solid var(--border)}
.tab{flex:1;padding:9px 0;font-size:13px;font-weight:500;text-align:center;border:none;background:transparent;color:var(--txt2);cursor:pointer;border-radius:7px;transition:all 0.15s;font-family:'Barlow',sans-serif}
.tab.active{background:var(--bg4);color:var(--txt);border:1px solid var(--border2)}
.panel{display:none}.panel.active{display:block}

/* GRID UTIL */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:1.25rem}

/* TEAM BOXES */
.team-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px}
.team-lbl{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:12px;font-family:'Barlow Condensed',sans-serif}
.lbl-opp{color:var(--red)}.lbl-me{color:var(--blue)}
.team-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.slot{background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:7px 4px 6px;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;transition:border-color 0.12s}
.slot.filled{cursor:pointer}.slot.filled:hover{border-color:var(--border2)}
.slot-x{position:absolute;top:3px;right:5px;font-size:10px;color:var(--txt3);background:none;border:none;cursor:pointer;opacity:0;transition:opacity 0.1s;color:var(--txt2);line-height:1;padding:0}
.slot:hover .slot-x{opacity:1}
.slot img{width:42px;height:42px;object-fit:contain;image-rendering:pixelated}
.slot-name{font-size:9px;font-weight:500;color:var(--txt2);text-align:center;line-height:1.2;margin-top:1px}
.slot-item{font-size:8px;color:var(--txt3);text-align:center;white-space:nowrap;overflow:hidden;max-width:100%}
.slot-empty{font-size:18px;color:var(--txt3)}
.slot-mega{font-size:7px;font-weight:700;color:var(--amber);letter-spacing:0.5px}

/* SEARCH ROW */
.search-row{display:flex;gap:8px;margin-bottom:10px}
.search-row input{flex:1;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--txt);font-size:13px;font-family:'Barlow',sans-serif;outline:none}
.search-row input:focus{border-color:var(--red)}
.search-row select{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--txt2);font-size:12px;font-family:'Barlow',sans-serif;outline:none;cursor:pointer;min-width:90px}
.search-row select:focus{border-color:var(--blue)}

/* POKEMON GRID */
.poke-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(82px,1fr));gap:5px;max-height:264px;overflow-y:auto;padding:2px;scrollbar-width:thin;scrollbar-color:var(--bg4) transparent}
.poke-grid::-webkit-scrollbar{width:4px}
.poke-grid::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
.pb{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:7px 3px 6px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;transition:all 0.12s}
.pb:hover{border-color:var(--border2);background:var(--bg3)}
.pb.sel-opp{border-color:var(--red);background:rgba(216,90,48,0.12)}
.pb.sel-me{border-color:var(--blue);background:rgba(55,138,221,0.12)}
.pb.dis{opacity:0.3;pointer-events:none}
.pb img{width:46px;height:46px;object-fit:contain;image-rendering:pixelated}
.pb-name{font-size:9px;font-weight:500;text-align:center;color:var(--txt2);line-height:1.2}
.tier-badge{position:absolute;top:3px;right:4px;font-size:8px;font-weight:800;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.3px}
.t-S{color:#ff6b47}.t-Ap{color:#e0a030}.t-A{color:var(--teal)}.t-B{color:var(--blue)}.t-C{color:var(--txt3)}

/* PREDICT BUTTON */
.predict-btn{width:100%;padding:11px;background:var(--red);color:white;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:1px;text-transform:uppercase;transition:all 0.15s;margin:1.25rem 0 1rem;box-shadow:0 4px 20px rgba(216,90,48,0.3)}
.predict-btn:hover{background:var(--red2);box-shadow:0 4px 28px rgba(216,90,48,0.5)}
.predict-btn:disabled{opacity:0.35;cursor:default;box-shadow:none}

/* PREDICTIONS */
.bring4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:1rem}
.bcard{background:var(--bg2);border:1.5px solid var(--border);border-radius:10px;padding:10px 6px 8px;display:flex;flex-direction:column;align-items:center;gap:3px;transition:border-color 0.12s}
.bcard.confirmed{border-color:var(--teal);background:rgba(29,158,117,0.1)}
.bcard img{width:46px;height:46px;object-fit:contain;image-rendering:pixelated}
.bcard-name{font-size:10px;font-weight:600;color:var(--txt);text-align:center;line-height:1.2}
.bcard-item{font-size:9px;color:var(--txt2);text-align:center}
.bcard-mega{font-size:9px;font-weight:700;color:var(--amber);font-family:'Barlow Condensed',sans-serif}
.bcard-prob{font-size:10px;font-weight:700;color:var(--txt3);font-family:'Barlow Condensed',sans-serif}
.item-toggle{width:100%;padding:3px 0;font-size:9px;background:transparent;border:1px solid var(--border2);border-radius:5px;cursor:pointer;font-family:'Barlow',sans-serif;color:var(--txt2);margin-top:2px;transition:all 0.12s}
.item-toggle:hover{background:var(--bg3)}
.item-toggle.conf{background:rgba(29,158,117,0.2);border-color:var(--teal);color:#4de8b4}
.action-row{display:flex;gap:8px;margin-bottom:1.5rem}
.action-row button{flex:1;padding:9px;font-size:13px;font-weight:500;font-family:'Barlow',sans-serif;border-radius:8px;cursor:pointer;transition:all 0.12s}
.btn-conf{background:rgba(29,158,117,0.15);color:#4de8b4;border:1px solid var(--teal)}
.btn-conf:hover{background:rgba(29,158,117,0.3)}
.btn-new{background:var(--bg3);color:var(--txt2);border:1px solid var(--border2)}
.btn-new:hover{background:var(--bg4)}
.empty-state{text-align:center;padding:2rem;color:var(--txt3);font-size:13px;background:var(--bg2);border:1px dashed var(--border2);border-radius:10px;line-height:1.7}
.pred-section-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);margin-bottom:10px;font-family:'Barlow Condensed',sans-serif}

/* META */
.meta-filters{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem}
.fpill{padding:5px 13px;font-size:12px;font-weight:500;border:1px solid var(--border2);border-radius:20px;background:transparent;cursor:pointer;color:var(--txt2);font-family:'Barlow',sans-serif;transition:all 0.12s}
.fpill.active{background:var(--txt);color:var(--bg);border-color:var(--txt)}
.fpill:hover:not(.active){background:var(--bg3)}
.meta-list{display:flex;flex-direction:column;gap:5px}
.mrow{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:10px 14px;display:flex;align-items:center;gap:10px;transition:border-color 0.12s}
.mrow:hover{border-color:var(--border2)}
.mrank{font-size:11px;font-weight:700;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;width:22px;text-align:right;flex-shrink:0}
.mrow img{width:38px;height:38px;object-fit:contain;image-rendering:pixelated;flex-shrink:0}
.minfo{flex:1;min-width:0}
.mname{font-size:13px;font-weight:500;color:var(--txt)}
.mrole{font-size:11px;color:var(--txt2)}
.mbar-wrap{width:110px;flex-shrink:0}
.mbar-bg{background:var(--bg3);border-radius:4px;height:5px;overflow:hidden}
.mbar-fill{height:5px;border-radius:4px;background:var(--red);transition:width 0.5s}
.mpct{font-size:11px;color:var(--txt2);font-weight:500;font-family:'Barlow Condensed',sans-serif;text-align:right;margin-top:2px}
.tier-chip{font-size:10px;font-weight:800;font-family:'Barlow Condensed',sans-serif;padding:3px 8px;border-radius:5px;flex-shrink:0}
.chip-S{background:rgba(255,107,71,0.15);color:#ff6b47;border:1px solid rgba(255,107,71,0.3)}
.chip-Ap{background:rgba(186,117,23,0.15);color:#e0a030;border:1px solid rgba(186,117,23,0.3)}
.chip-A{background:rgba(29,158,117,0.15);color:var(--teal);border:1px solid rgba(29,158,117,0.3)}
.chip-B{background:rgba(55,138,221,0.15);color:var(--blue);border:1px solid rgba(55,138,221,0.3)}
.chip-C{background:var(--bg3);color:var(--txt3);border:1px solid var(--border)}

/* LOG */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1.25rem}
.scard{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:14px;text-align:center}
.snum{font-size:28px;font-weight:700;color:var(--txt);font-family:'Barlow Condensed',sans-serif;line-height:1}
.slbl{font-size:11px;color:var(--txt2);margin-top:4px}
.log-form{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:1rem}
.log-form label{font-size:12px;color:var(--txt2);display:block;margin-bottom:5px;font-weight:500}
.log-form input,.log-form textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;color:var(--txt);font-size:13px;font-family:'Barlow',sans-serif;outline:none;margin-bottom:10px}
.log-form input:focus,.log-form textarea:focus{border-color:var(--blue)}
.log-form textarea{height:52px;resize:none}
.result-btns{display:flex;gap:6px;margin-bottom:12px}
.rbtn{flex:1;padding:8px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;text-transform:uppercase;border:1px solid var(--border2);background:transparent;color:var(--txt2);transition:all 0.12s}
.rbtn.win-on{background:rgba(29,158,117,0.2);border-color:var(--teal);color:#4de8b4}
.rbtn.loss-on{background:rgba(216,90,48,0.2);border-color:var(--red);color:#ff8a6b}
.log-submit{width:100%;padding:10px;background:var(--txt);color:var(--bg);border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px;text-transform:uppercase;transition:opacity 0.15s}
.log-submit:hover{opacity:0.85}
.log-entries{display:flex;flex-direction:column;gap:6px}
.lentry{background:var(--bg2);border:1px solid var(--border);border-radius:9px;padding:11px 14px;display:flex;align-items:flex-start;gap:10px}
.rdot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;font-family:'Barlow Condensed',sans-serif;letter-spacing:0.5px}
.rdot.w{background:rgba(29,158,117,0.2);color:#4de8b4;border:1px solid rgba(29,158,117,0.3)}
.rdot.l{background:rgba(216,90,48,0.2);color:#ff8a6b;border:1px solid rgba(216,90,48,0.3)}
.linfo{flex:1;min-width:0}
.lopp{font-size:13px;font-weight:500;color:var(--txt)}
.lpicks{font-size:11px;color:var(--txt2);margin-top:1px}
.lnote{font-size:11px;color:var(--txt3);margin-top:3px;font-style:italic}
.ldate{font-size:10px;color:var(--txt3);flex-shrink:0;margin-top:1px}

/* SECTION HEADER */
.section-h{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--txt3);margin-bottom:12px;font-family:'Barlow Condensed',sans-serif;display:flex;align-items:center;gap:8px}
.section-h::after{content:'';flex:1;height:1px;background:var(--border)}

/* COUNTERS */
.count-badge{font-size:11px;font-weight:600;color:var(--txt3);font-family:'Barlow Condensed',sans-serif;background:var(--bg3);padding:2px 8px;border-radius:10px;border:1px solid var(--border)}

/* SCROLLBAR */
html{scrollbar-width:thin;scrollbar-color:var(--bg4) var(--bg)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:4px}
</style>
</head>
<body>
<div class="wrap">

<div class="hdr">
  <div class="hdr-ball"></div>
  <div class="hdr-txt">
    <h1>Champions Doubles Tracker</h1>
    <p>Predict · Track · Learn — Regulation M-A</p>
  </div>
  <span class="season-pill">M-1 SEASON</span>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('predict',this)">Battle Predictor</button>
  <button class="tab" onclick="switchTab('meta',this)">Meta Stats</button>
  <button class="tab" onclick="switchTab('log',this)">Match Log</button>
</div>

<!-- PREDICT TAB -->
<div id="tab-predict" class="panel active">
  <div class="two-col">
    <div class="team-box">
      <div class="team-lbl lbl-opp">Opponent Team (6 seen)</div>
      <div class="team-slots" id="opp-slots"></div>
    </div>
    <div class="team-box">
      <div class="team-lbl lbl-me">My Team (known)</div>
      <div class="team-slots" id="my-slots"></div>
    </div>
  </div>

  <div class="search-row">
    <input type="text" id="poke-search" placeholder="Search Pokémon..." oninput="renderGrid()">
    <select id="tier-filter" onchange="renderGrid()">
      <option value="">All tiers</option>
      <option value="S">S tier</option>
      <option value="A+">A+ tier</option>
      <option value="A">A tier</option>
      <option value="B">B tier</option>
      <option value="C">C tier</option>
    </select>
    <select id="role-filter" onchange="renderGrid()">
      <option value="">All roles</option>
      <option value="support">Support</option>
      <option value="attacker">Attacker</option>
      <option value="weather">Weather</option>
    </select>
    <select id="add-to" onchange="renderGrid()">
      <option value="opp">→ Opp</option>
      <option value="me">→ Me</option>
    </select>
  </div>
  <div class="poke-grid" id="pokemon-grid"></div>

  <button class="predict-btn" id="predict-btn" onclick="runPrediction()" disabled>
    Predict Opponent's Bring-4 →
  </button>

  <div id="predictions-area">
    <div class="empty-state">Add 2–6 Pokémon to the opponent's team to unlock bring-4 predictions.<br><span style="font-size:11px;color:#55556a">Based on M-1 usage rates, tier, and Mega Evolution potential</span></div>
  </div>
</div>

<!-- META TAB -->
<div id="tab-meta" class="panel">
  <div class="meta-filters">
    <button class="fpill active" onclick="filterMeta(this,'all')">All</button>
    <button class="fpill" onclick="filterMeta(this,'S')">S Tier</button>
    <button class="fpill" onclick="filterMeta(this,'A+')">A+ Tier</button>
    <button class="fpill" onclick="filterMeta(this,'A')">A Tier</button>
    <button class="fpill" onclick="filterMeta(this,'support')">Support</button>
    <button class="fpill" onclick="filterMeta(this,'attacker')">Attacker</button>
    <button class="fpill" onclick="filterMeta(this,'weather')">Weather</button>
    <button class="fpill" onclick="filterMeta(this,'mega')">Has Mega</button>
  </div>
  <div class="meta-list" id="meta-list"></div>
</div>

<!-- LOG TAB -->
<div id="tab-log" class="panel">
  <div class="stats-grid">
    <div class="scard"><div class="snum" id="stat-total">0</div><div class="slbl">Battles</div></div>
    <div class="scard"><div class="snum" id="stat-wr">—</div><div class="slbl">Win rate</div></div>
    <div class="scard"><div class="snum" id="stat-streak">—</div><div class="slbl">Streak</div></div>
  </div>
  <div class="log-form">
    <label>Result</label>
    <div class="result-btns">
      <button class="rbtn" id="btn-win" onclick="setResult('Win')">Win</button>
      <button class="rbtn" id="btn-loss" onclick="setResult('Loss')">Loss</button>
    </div>
    <label>Opponent's lead (optional)</label>
    <input type="text" id="log-opp" placeholder="e.g. Incineroar + Dragonite">
    <label>My lead (optional)</label>
    <input type="text" id="log-me" placeholder="e.g. Whimsicott + Garchomp">
    <label>Notes</label>
    <textarea id="log-note" placeholder="Key reads, misplays, or anything to remember..."></textarea>
    <button class="log-submit" onclick="logBattle()">Log Battle</button>
  </div>
  <div class="log-entries" id="log-entries"></div>
</div>

</div>

const POKEMON = [];
const seen = new Set();
for(const p of RAW){
  if(!seen.has(p.name)){seen.add(p.name);POKEMON.push(p);}
}
POKEMON.sort((a,b)=>b.usage-a.usage);

let oppTeam=[], myTeam=[], predictions=[], metaFilter='all', battleResult=null, matchLog=[];

function pokeImg(id){return`https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`}

function renderSlots(arr,cid,side){
  const c=document.getElementById(cid);
  c.innerHTML='';
  for(let i=0;i<6;i++){
    const d=document.createElement('div');
    d.className='slot'+(arr[i]?' filled':'');
    if(arr[i]){
      const p=arr[i];
      d.innerHTML=`<button class="slot-x" onclick="removeSlot('${side}',${i})">✕</button><img src="${pokeImg(p.id)}" alt="${p.name}"><div class="slot-name">${p.name}</div><div class="slot-item">${p.item}</div>${p.mega?'<div class="slot-mega">MEGA ✦</div>':''}`;
    } else {
      d.innerHTML=`<span class="slot-empty">+</span>`;
    }
    c.appendChild(d);
  }
}

function removeSlot(side,i){
  if(side==='opp') oppTeam.splice(i,1);
  else myTeam.splice(i,1);
  updateAll();
}

function renderGrid(){
  const q=document.getElementById('poke-search').value.toLowerCase();
  const tier=document.getElementById('tier-filter').value;
  const role=document.getElementById('role-filter').value;
  const side=document.getElementById('add-to').value;
  const curTeam=side==='opp'?oppTeam:myTeam;
  const grid=document.getElementById('pokemon-grid');
  grid.innerHTML='';
  let shown=0;
  for(const p of POKEMON){
    if(tier&&p.tier!==tier) continue;
    if(role&&!p.tags.includes(role)) continue;
    if(q&&!p.name.toLowerCase().includes(q)) continue;
    if(shown>=120) break;
    shown++;
    const inOpp=oppTeam.some(x=>x.name===p.name);
    const inMe=myTeam.some(x=>x.name===p.name);
    const full=curTeam.length>=6&&!inOpp&&!inMe;
    const btn=document.createElement('button');
    btn.className='pb'+(inOpp?' sel-opp':inMe?' sel-me':full?' dis':'');
    const tc='t-'+(p.tier==='A+'?'Ap':p.tier);
    btn.innerHTML=`<span class="tier-badge ${tc}">${p.tier}</span><img src="${pokeImg(p.id)}" alt="${p.name}" loading="lazy"><div class="pb-name">${p.name}</div>`;
    btn.onclick=()=>togglePoke(p,side);
    grid.appendChild(btn);
  }
}

function togglePoke(p,side){
  if(side==='opp'){
    const i=oppTeam.findIndex(x=>x.name===p.name);
    if(i>=0) oppTeam.splice(i,1); else if(oppTeam.length<6) oppTeam.push({...p});
  } else {
    const i=myTeam.findIndex(x=>x.name===p.name);
    if(i>=0) myTeam.splice(i,1); else if(myTeam.length<6) myTeam.push({...p});
  }
  updateAll();
}

function updateAll(){
  renderSlots(oppTeam,'opp-slots','opp');
  renderSlots(myTeam,'my-slots','me');
  renderGrid();
  document.getElementById('predict-btn').disabled=oppTeam.length<2;
  if(oppTeam.length<2){
    document.getElementById('predictions-area').innerHTML='<div class="empty-state">Add 2–6 Pokémon to the opponent\'s team to unlock bring-4 predictions.<br><span style="font-size:11px;color:#55556a">Based on M-1 usage rates, tier, and Mega Evolution potential</span></div>';
    predictions=[];
  }
}

function runPrediction(){
  const scored=oppTeam.map(p=>{
    let s=p.usage;
    if(p.tier==='S') s+=25; if(p.tier==='A+') s+=18; if(p.tier==='A') s+=10; if(p.tier==='B') s+=4;
    if(p.mega) s+=7;
    if(p.role==='weather') s+=5;
    return{p:{...p},s,confirmed:false};
  });
  scored.sort((a,b)=>b.s-a.s);
  predictions=scored.slice(0,Math.min(4,oppTeam.length));
  renderPredictions();
}

function renderPredictions(){
  const area=document.getElementById('predictions-area');
  if(!predictions.length){area.innerHTML='';return;}
  let html='<div class="pred-section-h">Predicted bring-4 picks</div><div class="bring4">';
  for(const pred of predictions){
    const p=pred.p;
    const pct=Math.min(99,Math.round(50+(p.usage/100)*44));
    html+=`<div class="bcard${pred.confirmed?' confirmed':''}">
      <div class="bcard-prob">${pct}%</div>
      <img src="${pokeImg(p.id)}" alt="${p.name}">
      <div class="bcard-name">${p.name}</div>
      ${p.mega?'<div class="bcard-mega">MEGA ✦</div>':''}
      <div class="bcard-item">${p.item}</div>
      <button class="item-toggle${pred.confirmed?' conf':''}" onclick="toggleConf('${p.name}')">${pred.confirmed?'✓ Seen':'Mark as seen'}</button>
    </div>`;
  }
  html+=`</div><div class="action-row">
    <button class="btn-conf" onclick="confirmAndLearn()">✓ Confirm & Learn</button>
    <button class="btn-new" onclick="newBattle()">New Battle</button>
  </div>`;
  area.innerHTML=html;
}

function toggleConf(name){
  const pred=predictions.find(x=>x.p.name===name);
  if(pred) pred.confirmed=!pred.confirmed;
  renderPredictions();
}

function confirmAndLearn(){
  predictions.forEach(pred=>{
    if(pred.confirmed){
      const poke=POKEMON.find(x=>x.name===pred.p.name);
      if(poke) poke.usage=Math.min(100,poke.usage+2);
    }
  });
  alert('Usage rates updated. Keep tracking to improve predictions!');
  newBattle();
}

function newBattle(){
  oppTeam=[];predictions=[];
  updateAll();
  renderMeta();
}

function renderMeta(){
  const list=document.getElementById('meta-list');
  let filtered=POKEMON.filter(p=>{
    if(metaFilter==='all') return true;
    if(metaFilter==='S') return p.tier==='S';
    if(metaFilter==='A+') return p.tier==='A+';
    if(metaFilter==='A') return p.tier==='A';
    if(metaFilter==='support') return p.role==='support';
    if(metaFilter==='attacker') return p.role==='attacker';
    if(metaFilter==='weather') return p.tags.includes('weather');
    if(metaFilter==='mega') return p.mega;
    return true;
  });
  const top=filtered.slice(0,50);
  const maxU=top[0]?top[0].usage:100;
  list.innerHTML=top.map((p,i)=>{
    const tc='chip-'+(p.tier==='A+'?'Ap':p.tier);
    return`<div class="mrow">
      <div class="mrank">#${i+1}</div>
      <img src="${pokeImg(p.id)}" alt="${p.name}">
      <div class="minfo"><div class="mname">${p.name}${p.mega?' ✦':''}</div><div class="mrole">${p.role} · ${p.item}</div></div>
      <div class="mbar-wrap">
        <div class="mbar-bg"><div class="mbar-fill" style="width:${Math.round((p.usage/maxU)*100)}%"></div></div>
        <div class="mpct">${p.usage}% usage</div>
      </div>
      <div class="tier-chip ${tc}">${p.tier}</div>
    </div>`;
  }).join('');
}

function filterMeta(el,f){
  metaFilter=f;
  document.querySelectorAll('.fpill').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  renderMeta();
}

function switchTab(id,el){
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
}

function setResult(r){
  battleResult=r;
  document.getElementById('btn-win').className='rbtn'+(r==='Win'?' win-on':'');
  document.getElementById('btn-loss').className='rbtn'+(r==='Loss'?' loss-on':'');
}

function logBattle(){
  if(!battleResult){alert('Select Win or Loss first.');return;}
  matchLog.unshift({result:battleResult,opp:document.getElementById('log-opp').value.trim(),me:document.getElementById('log-me').value.trim(),note:document.getElementById('log-note').value.trim(),date:new Date().toLocaleDateString()});
  document.getElementById('log-opp').value='';
  document.getElementById('log-me').value='';
  document.getElementById('log-note').value='';
  battleResult=null;
  document.getElementById('btn-win').className='rbtn';
  document.getElementById('btn-loss').className='rbtn';
  renderLog();
}

function renderLog(){
  const total=matchLog.length;
  const wins=matchLog.filter(x=>x.result==='Win').length;
  document.getElementById('stat-total').textContent=total;
  document.getElementById('stat-wr').textContent=total?Math.round(wins/total*100)+'%':'—';
  let streak=0;
  if(total){const r=matchLog[0].result;for(const e of matchLog){if(e.result===r)streak++;else break;}}
  document.getElementById('stat-streak').textContent=total?(matchLog[0].result[0]+streak):'—';
  document.getElementById('log-entries').innerHTML=matchLog.map(e=>`<div class="lentry">
    <div class="rdot ${e.result==='Win'?'w':'l'}">${e.result==='Win'?'WIN':'LOSS'}</div>
    <div class="linfo">
      <div class="lopp">${e.opp||'Unknown lead'}</div>
      ${e.me?`<div class="lpicks">My lead: ${e.me}</div>`:''}
      ${e.note?`<div class="lnote">${e.note}</div>`:''}
    </div>
    <div class="ldate">${e.date}</div>
  </div>`).join('');
}

updateAll();
renderMeta();
renderLog();
</script>
</body>
</html>
