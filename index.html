<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Doubles Meta Tracker 2026 - Team Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }
        
        .badge {
            display: inline-block;
            background: #ef4444;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8em;
            margin-bottom: 15px;
            font-weight: bold;
        }
        
        .analyzer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(500px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .team-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .team-header {
            font-size: 1.5em;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #667eea;
        }
        
        .pokemon-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .pokemon-slot {
            position: relative;
        }
        
        .pokemon-slot select, .pokemon-slot input {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .pokemon-slot select:focus, .pokemon-slot input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .remove-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #ef4444;
            color: white;
            border: none;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            cursor: pointer;
            font-size: 12px;
            display: none;
        }
        
        .predictions-card {
            background: white;
            border-radius: 20px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
        
        .prediction-item {
            background: #f8f9fa;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #667eea;
        }
        
        .prediction-item:hover {
            transform: translateX(5px);
            background: #e9ecef;
        }
        
        .prediction-high {
            border-left-color: #10b981;
            background: #f0fdf4;
        }
        
        .prediction-medium {
            border-left-color: #f59e0b;
        }
        
        .prediction-low {
            border-left-color: #ef4444;
        }
        
        .confirm-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 5px 15px;
            border-radius: 5px;
            margin-left: 10px;
            cursor: pointer;
        }
        
        .learning-stats {
            background: linear-gradient(135deg, #667eea 20%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            margin-top: 15px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 10px;
        }
        
        .stat-box {
            text-align: center;
            padding: 10px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
        }
        
        .stat-number {
            font-size: 1.5em;
            font-weight: bold;
        }
        
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #667eea;
            color: white;
        }
        
        .btn-success {
            background: #10b981;
            color: white;
        }
        
        .btn-warning {
            background: #f59e0b;
            color: white;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        
        .modal-content {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }
        
        @media (max-width: 768px) {
            .analyzer-grid {
                grid-template-columns: 1fr;
            }
            h1 { font-size: 1.5em; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="badge">VGC 2026 SEASON | AI POWERED</div>
            <h1>🐉 Pokémon Doubles Meta Tracker</h1>
            <div class="subtitle">Real-time Team Preview Analyzer | Learns from every battle</div>
            <div class="last-update" id="lastUpdate">Loading...</div>
        </div>
        
        <div class="analyzer-grid">
            <!-- Your Team -->
            <div class="team-card">
                <div class="team-header">🌟 Your Team</div>
                <div class="pokemon-selector" id="yourTeam"></div>
                <button class="btn btn-primary" onclick="addPokemonSlot('your')">+ Add Pokémon</button>
                <div style="margin-top: 10px; font-size: 0.8em; color: #666;">
                    Click to edit | Add up to 6 Pokémon
                </div>
            </div>
            
            <!-- Opponent Team -->
            <div class="team-card">
                <div class="team-header">👥 Opponent's Team</div>
                <div class="pokemon-selector" id="opponentTeam"></div>
                <button class="btn btn-primary" onclick="addPokemonSlot('opponent')">+ Add Pokémon</button>
                <div style="margin-top: 10px; font-size: 0.8em; color: #666;">
                    Enter their 6 Pokémon from team preview
                </div>
            </div>
        </div>
        
        <!-- AI Predictions -->
        <div class="predictions-card" id="predictionsCard" style="display: none;">
            <h2>🤖 AI Predictions</h2>
            <div id="predictions"></div>
            <div class="learning-stats" id="learningStats"></div>
            <div class="action-buttons">
                <button class="btn btn-success" onclick="confirmPredictions()">✓ Confirm Actual Bring</button>
                <button class="btn btn-warning" onclick="resetBattle()">🔄 New Battle</button>
            </div>
        </div>
        
        <!-- Meta Stats -->
        <div class="predictions-card">
            <h2>📊 Current 2026 Meta Stats</h2>
            <div id="metaStats"></div>
        </div>
    </div>
    
    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle"></h2>
            <div id="modalBody"></div>
            <button onclick="closeModal()" style="margin-top: 20px;">Close</button>
        </div>
    </div>
    
    <script>
        // Pokémon database for 2026
        const pokemonList = [
            "Flutter Mane", "Iron Hands", "Urshifu-Rapid-Strike", "Raging Bolt", "Gouging Fire",
            "Tornadus", "Chi-Yu", "Landorus-Therian", "Rillaboom", "Amoonguss", "Chien-Pao",
            "Indeedee-F", "Farigiraf", "Ogerpon-Wellspring", "Heatran", "Dragonite", "Gholdengo",
            "Whimsicott", "Incineroar", "Terapagos", "Koraidon", "Miraidon", "Walking Wake",
            "Iron Crown", "Iron Boulder", "Entei", "Raikou", "Suicune", "Latios", "Latias"
        ];
        
        // Learning database - stores patterns of what opponents bring
        let learningData = {
            patterns: {},
            totalBattles: 0,
            correctPredictions: 0
        };
        
        // Current battle state
        let currentBattle = {
            yourTeam: [],
            opponentTeam: [],
            predictions: [],
            actualBring: [],
            battleHistory: []
        };
        
        // Load learning data from localStorage
        function loadLearningData() {
            const saved = localStorage.getItem('pokemon_learning_data_2026');
            if (saved) {
                learningData = JSON.parse(saved);
                updateLearningStats();
            }
        }
        
        // Save learning data
        function saveLearningData() {
            localStorage.setItem('pokemon_learning_data_2026', JSON.stringify(learningData));
            updateLearningStats();
        }
        
        // Initialize team selectors
        function initTeamSelectors() {
            // Create 6 slots for each team
            for (let i = 0; i < 6; i++) {
                addPokemonSlot('your', i);
                addPokemonSlot('opponent', i);
            }
        }
        
        function addPokemonSlot(team, index = null) {
            const container = document.getElementById(`${team}Team`);
            const slotIndex = index !== null ? index : container.children.length;
            
            const slot = document.createElement('div');
            slot.className = 'pokemon-slot';
            slot.style.marginBottom = '10px';
            
            const select = document.createElement('select');
            select.innerHTML = '<option value="">Select Pokémon...</option>' + 
                pokemonList.map(p => `<option value="${p}">${p}</option>`).join('');
            
            select.onchange = () => updatePredictions();
            
            slot.appendChild(select);
            container.appendChild(slot);
        }
        
        // Get current teams
        function getTeams() {
            const yourTeam = [];
            const yourSelects = document.querySelectorAll('#yourTeam select');
            yourSelects.forEach(select => {
                if (select.value) yourTeam.push(select.value);
            });
            
            const opponentTeam = [];
            const opponentSelects = document.querySelectorAll('#opponentTeam select');
            opponentSelects.forEach(select => {
                if (select.value) opponentTeam.push(select.value);
            });
            
            return { yourTeam, opponentTeam };
        }
        
        // AI Prediction Algorithm
        function predictOpponentBring() {
            const { yourTeam, opponentTeam } = getTeams();
            
            if (opponentTeam.length < 4) {
                document.getElementById('predictionsCard').style.display = 'none';
                return;
            }
            
            currentBattle.yourTeam = yourTeam;
            currentBattle.opponentTeam = opponentTeam;
            
            // Calculate prediction scores based on:
            // 1. Meta usage stats
            // 2. Historical patterns from learning data
            // 3. Team synergy and counters
            
            const predictions = opponentTeam.map(pokemon => {
                let score = 50; // Base score
                
                // Factor 1: Meta usage (from our data)
                const metaUsage = metaData[pokemon] || 10;
                score += metaUsage / 2;
                
                // Factor 2: Historical patterns
                const patternKey = `${yourTeam.sort().join(',')}|${pokemon}`;
                if (learningData.patterns[patternKey]) {
                    score += learningData.patterns[patternKey].bringRate * 30;
                }
                
                // Factor 3: Common cores and synergies
                const commonCores = {
                    "Indeedee-F": ["Armarouge", "Torkoal"],
                    "Tornadus": ["Urshifu-Rapid-Strike", "Rillaboom"],
                    "Farigiraf": ["Iron Hands", "Torkoal"]
                };
                
                for (const [coreMon, partners] of Object.entries(commonCores)) {
                    if (opponentTeam.includes(coreMon) && partners.includes(pokemon)) {
                        score += 20;
                    }
                }
                
                return { pokemon, score: Math.min(100, score) };
            });
            
            // Sort by score and add confidence levels
            const sorted = predictions.sort((a,b) => b.score - a.score);
            const top4 = sorted.slice(0,4);
            
            currentBattle.predictions = top4;
            
            // Display predictions
            const predictionsHtml = top4.map((pred, i) => {
                let confidence = 'low';
                let confidenceText = '';
                if (pred.score > 70) {
                    confidence = 'high';
                    confidenceText = 'High confidence';
                } else if (pred.score > 50) {
                    confidence = 'medium';
                    confidenceText = 'Medium confidence';
                } else {
                    confidence = 'low';
                    confidenceText = 'Low confidence';
                }
                
                return `
                    <div class="prediction-item prediction-${confidence}" onclick="selectPrediction('${pred.pokemon}')">
                        <strong>#${i+1} Prediction: ${pred.pokemon}</strong>
                        <span style="float: right">${confidenceText} (${Math.round(pred.score)}%)</span>
                        <div class="usage-bar" style="margin-top: 5px">
                            <div class="usage-fill" style="width: ${pred.score}%; height: 6px"></div>
                        </div>
                        <button class="confirm-btn" onclick="event.stopPropagation(); confirmBring('${pred.pokemon}')">✓ Confirm they brought this</button>
                    </div>
                `;
            }).join('');
            
            document.getElementById('predictions').innerHTML = predictionsHtml;
            document.getElementById('predictionsCard').style.display = 'block';
            
            updateLearningStats();
        }
        
        function selectPrediction(pokemon) {
            showNotification(`Selected ${pokemon} as prediction`, 'info');
        }
        
        function confirmBring(pokemon) {
            if (!currentBattle.actualBring.includes(pokemon)) {
                currentBattle.actualBring.push(pokemon);
                showNotification(`Confirmed: ${pokemon} was brought!`, 'success');
                
                // Check if we have all 4
                if (currentBattle.actualBring.length === 4) {
                    learnFromBattle();
                } else {
                    // Update remaining predictions
                    updateRemainingPredictions();
                }
            }
        }
        
        function confirmPredictions() {
            if (currentBattle.actualBring.length === 0) {
                showNotification('Please confirm at least one Pokémon they brought', 'warning');
                return;
            }
            learnFromBattle();
        }
        
        function updateRemainingPredictions() {
            const remaining = currentBattle.predictions.filter(p => !currentBattle.actualBring.includes(p.pokemon));
            const predictionsHtml = remaining.map((pred, i) => `
                <div class="prediction-item prediction-${pred.score > 70 ? 'high' : pred.score > 50 ? 'medium' : 'low'}">
                    <strong>Prediction: ${pred.pokemon}</strong>
                    <span style="float: right">${Math.round(pred.score)}% confidence</span>
                    <button class="confirm-btn" onclick="confirmBring('${pred.pokemon}')">✓ Confirm they brought this</button>
                </div>
            `).join('');
            
            if (remaining.length > 0) {
                document.getElementById('predictions').innerHTML = predictionsHtml + 
                    '<div style="margin-top: 10px; padding: 10px; background: #e0f2fe; border-radius: 10px;">' +
                    `✅ Already confirmed: ${currentBattle.actualBring.join(', ')}<br>` +
                    `📊 Waiting for ${remaining.length} more confirmation(s)...` +
                    '</div>';
            }
        }
        
        function learnFromBattle() {
            // Record the pattern
            const { yourTeam, opponentTeam } = getTeams();
            
            currentBattle.predictions.forEach(pred => {
                const wasCorrect = currentBattle.actualBring.includes(pred.pokemon);
                const patternKey = `${yourTeam.sort().join(',')}|${pred.pokemon}`;
                
                if (!learningData.patterns[patternKey]) {
                    learningData.patterns[patternKey] = { brought: 0, total: 0, bringRate: 0 };
                }
                
                learningData.patterns[patternKey].total++;
                if (wasCorrect) {
                    learningData.patterns[patternKey].brought++;
                    learningData.correctPredictions++;
                }
                learningData.patterns[patternKey].bringRate = 
                    learningData.patterns[patternKey].brought / learningData.patterns[patternKey].total;
            });
            
            learningData.totalBattles++;
            saveLearningData();
            
            // Save to battle history
            currentBattle.battleHistory.push({
                timestamp: new Date().toISOString(),
                yourTeam: [...yourTeam],
                opponentTeam: [...opponentTeam],
                actualBring: [...currentBattle.actualBring],
                predictions: [...currentBattle.predictions]
            });
            
            showNotification(`Battle recorded! AI is getting smarter! 🧠`, 'success');
            
            // Reset for next battle after 3 seconds
            setTimeout(() => {
                resetBattle();
            }, 3000);
        }
        
        function resetBattle() {
            currentBattle.actualBring = [];
            currentBattle.predictions = [];
            document.getElementById('predictionsCard').style.display = 'none';
            showNotification('Ready for next battle! Enter new teams', 'info');
        }
        
        function updateLearningStats() {
            const accuracy = learningData.totalBattles > 0 ? 
                (learningData.correctPredictions / (learningData.totalBattles * 4) * 100).toFixed(1) : 0;
            
            const statsHtml = `
                <div class="stats-grid">
                    <div class="stat-box">
                        <div class="stat-number">${learningData.totalBattles}</div>
                        <div>Battles Analyzed</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${accuracy}%</div>
                        <div>Prediction Accuracy</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">${Object.keys(learningData.patterns).length}</div>
                        <div>Patterns Learned</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number">🎯</div>
                        <div>Getting Smarter!</div>
                    </div>
                </div>
                <div style="margin-top: 10px; font-size: 0.8em;">
                    💡 The AI learns from every battle you confirm!
                </div>
            `;
            
            document.getElementById('learningStats').innerHTML = statsHtml;
        }
        
        function updatePredictions() {
            const { yourTeam, opponentTeam } = getTeams();
            if (opponentTeam.length >= 4) {
                predictOpponentBring();
            } else {
                document.getElementById('predictionsCard').style.display = 'none';
            }
        }
        
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = 'notification';
            notification.style.background = type === 'success' ? '#10b981' : type === 'warning' ? '#f59e0b' : '#667eea';
            notification.style.color = 'white';
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => notification.remove(), 3000);
        }
        
        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }
        
        // Meta data for 2026
        let metaData = {
            "Flutter Mane": 47.3, "Iron Hands": 41.2, "Urshifu-Rapid-Strike": 38.9,
            "Raging Bolt": 36.5, "Gouging Fire": 34.8, "Tornadus": 33.1,
            "Chi-Yu": 30.4, "Landorus-Therian": 28.7, "Rillaboom": 26.3,
            "Amoonguss": 24.9, "Chien-Pao": 23.5, "Indeedee-F": 21.8,
            "Farigiraf": 20.1, "Ogerpon-Wellspring": 18.7, "Heatran": 17.4
        };
        
        function displayMetaStats() {
            const top10 = Object.entries(metaData).slice(0, 10);
            const html = top10.map(([name, usage], i) => `
                <div class="pokemon-item">
                    <div class="pokemon-name">${i+1}. ${name}</div>
                    <div class="usage-bar">
                        <div class="usage-fill" style="width: ${usage * 1.5}%"></div>
                    </div>
                    <div class="usage-text">${usage.toFixed(1)}% usage</div>
                </div>
            `).join('');
            
            document.getElementById('metaStats').innerHTML = html;
            document.getElementById('lastUpdate').innerHTML = `📅 VGC 2026 Data | Learning from ${learningData.totalBattles} battles`;
        }
        
        // Initialize everything
        function init() {
            loadLearningData();
            initTeamSelectors();
            displayMetaStats();
            
            // Add event listeners for real-time updates
            const observer = new MutationObserver(() => updatePredictions());
            observer.observe(document.getElementById('yourTeam'), { childList: true, subtree: true });
            observer.observe(document.getElementById('opponentTeam'), { childList: true, subtree: true });
        }
        
        init();
    </script>
</body>
</html>
